name: Construir y Subir Imagen a CR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tagging
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build-Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Ejecutar despliegue en AWS vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST_PROD }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY_PROD }}
          script: |
            kubectl create secret generic tfm-ai-api-secrets \
              --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              --from-literal=MASTER_API_KEY="${{ secrets.MASTER_API_KEY }}" \
              -n tfm-ai-api \
              --dry-run=client -o yaml | kubectl apply -f -
              
            kubectl rollout restart deployment tfm-ai-api -n tfm-ai-api