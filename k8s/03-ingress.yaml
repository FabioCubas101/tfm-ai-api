apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tfm-ai-api
  namespace: tfm-ai-api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: tfm-ai-api-https-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - fabio-api.helmcode.com
    secretName: tfm-ai-api-tls
  rules:
  - host: fabio-api.helmcode.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tfm-ai-api
            port:
              number: 8000
