apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tfm-ai-api
  namespace: tfm-ai-api
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`fabio-api.helmcode.com`)
      kind: Rule
      services:
        - name: tfm-ai-api
          port: 8000
      middlewares:
        - name: https-redirect
  tls:
    certResolver: letsencrypt