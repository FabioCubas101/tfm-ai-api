apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "helm-chart.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "helm-chart.fullname" . }}
          port: {{ .Values.service.port }}
      middlewares:
        - name: {{ include "helm-chart.fullname" . }}-https-redirect
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "helm-chart.fullname" . }}-https
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "helm-chart.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    certResolver: {{ .Values.ingress.certResolver }}