apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/bruno-Practicas/tfm-ai.git//k8s?ref=main

patches:
  - target:
      kind: Ingress
      name: frontend-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: fabio.helmcode.com 
      
      - op: replace
        path: /spec/tls/0/hosts/0
        value: fabio.helmcode.com 